version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${SENTINEL_DB_PASSWORD:-sentinel_dev_only}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "8400:8400"
    environment:
      SENTINEL_DB_HOST: db
      SENTINEL_DB_USER: sentinel
      SENTINEL_DB_PASSWORD: ${SENTINEL_DB_PASSWORD:-sentinel_dev_only}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
