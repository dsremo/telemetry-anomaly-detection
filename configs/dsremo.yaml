# Dsremo Configuration
# Secrets go in environment variables, never here.

server:
  host: "0.0.0.0"
  port: 8400
  workers: 1
  cors_origins:
    - "http://localhost:8400"
    - "https://detect.dsremo.com"
    - "https://dsremo.com"

database:
  host: "localhost"
  port: 5432
  name: "dsremo"
  user: "dsremo"
  password: ""  # overridden by DSREMO_DB_PASSWORD env var
  pool_min: 2
  pool_max: 10

security:
  api_key_header: "X-API-Key"
  rate_limit_per_minute: 300
  max_payload_bytes: 1_048_576  # 1 MB
  hmac_algorithm: "sha256"

detection:
  # ── Z-Score spike detector (runs on STL residuals) ──────────────────
  z_score_threshold: 3.5    # flag residuals above 3.5σ from rolling mean
                            # per Iglewicz & Hoaglin (1993) Modified z-score recommendation
                            # z-score is spike-only; drift is handled by CUSUM

  # ── CUSUM drift detector — NASA flight operations parameters (cf. NPR 7150.2D, NASA-STD-8719.13C) ──
  # k = allowance = 0.5 × σ_ref   (detect shifts ≥ 1σ)
  # H = threshold = 8.0 × σ_ref   (require 8σ of accumulated evidence)
  #   H was raised from 5.0 to 8.0 to handle long-term telemetry drift;
  #   satellite signals age over months/years — a higher threshold avoids
  #   flagging normal aging as anomalies.
  # Both are per-channel — derived from the calibration reference window.
  cusum_k_factor: 0.5
  cusum_h_factor: 8.0
  cusum_recal_factor: 3.0   # recalibrate if mean drifts > 3σ for 20 samples
                            # lower = more responsive to slow regime shifts

  # ── EWMA level-shift detector ────────────────────────────────────────
  ewma_lambda: 0.1          # smoothing: 0.1=slow/sensitive, 0.3=fast/noisy
                            # lowered from 0.2 → less reactive to brief spikes
  ewma_sigma_factor: 3.5    # UCL/LCL = ±3.5σ × sqrt(λ/(2-λ))
                            # raised from 3.0 → fewer false level-shift alarms

  # ── Per-channel calibration ──────────────────────────────────────────
  calibration_window: 200   # residual samples before CUSUM/EWMA activate
                            # 200 hourly points = ~8 days: better σ_ref estimate
                            # than 100 (4 days); still activates in first week.

  # ── Alert cooldown: minimum hours between anomaly reports ────────────
  # Suppresses repeated alarms during a sustained anomalous regime.
  # Each distinct anomaly event should be flagged once, not repeatedly.
  # 360 h = 15 days: caps channels with persistent signals at ~13 alarms
  # over a 13-year mission (4745 days / 15 days ≈ 316 max, but adaptive
  # σ_ref should reduce genuine alarm rate well below that ceiling).
  alert_cooldown_hours: 360  # 15 days between same-channel reports

  # Persistence filter — require N consecutive anomalous detection windows
  # before emitting an alert (streaming path only, run_detection_cycle).
  # 1 = disabled (default for batch analysis).
  # 2-3 = production streaming (NASA flight operations pattern, cf. NPR 7150.2D, uses 3-5 consecutive OOL samples;
  # YAMCS default = 2).  Eliminates single-sample FPs without any data scan.
  alert_persistence_min: 1

  # ── Hierarchical Alert Routing: Incident Grouping (Sprint 17) ────────
  # Anomalies within incident_window_s on the same satellite → one Incident.
  # Operators see one incident card, not N individual alarm notifications.
  # Production standard: NASA GSFC event correlation pattern (cf. NPR 7150.2D §5.3) 600s; SpaceX 5min for telemetry anomalies.
  incident_window_s:      300   # 5 min correlation window
  incident_close_after_s: 3600  # auto-close incident after 1 h of silence

  # ── Stale Data Detection (NASA flight operations pattern, cf. NPR 7150.2D, NASA-STD-8719.13C / ISRO FOLIO standard, Sprint 18) ─
  # Alert when a channel's last known telemetry timestamp is older than
  # stale_threshold_s.  Catches sensor dropout, power-off, and comms loss.
  # Set to orbital_period_s / 3 for deep-space missions (e.g. 1800s for LEO).
  stale_threshold_s: 300   # 5 min default (matches ISS downlink cadence)

  # ── Time-to-Limit Prediction (SpaceX / ISRO pattern, Sprint 18) ────────
  # When hard_limit_high/low are set on a channel and TrendVelocity detects
  # active drift, warn when the redline will be breached within ttl_warn_min.
  ttl_warn_min: 60   # warn at < 60 min to redline; critical at < 20 min
  expected_contact_gap_s: 0   # 0=disabled; set >0 for LEO satellites with AOS/LOS gaps

  # ── Mission Phase Gating (ISRO/NASA operations pattern) ──────────────
  # Suppresses specified detectors during dynamic mission phases to prevent
  # false alarms.  Operators set phase via POST /satellites/{id}/phase.
  mission_phase_gating:
    maneuver:    [statistical, trend_velocity, cusum]
    safe_mode:   [cusum, ewma, trend_velocity, variance]
    eclipse:     [variance, statistical]
    nominal:     []

  # ── Adaptive σ_ref: periodic noise-floor refresh ─────────────────────
  # After initial calibration, σ_ref is refreshed every N samples using
  # the last CALIBRATION_WINDOW post-calibration residuals.  This prevents
  # the frozen σ_ref (from the first 8 days of data) from becoming stale
  # on 13-year signals where component aging or seasonal effects slowly
  # change the noise variance.  A too-small σ_ref makes CUSUM accumulate
  # normal drift and fire as false positives.
  # 720 = 30 days at 1-h resampling.  Only updates when σ changes >10%.
  sigma_update_interval: 720
  sigma_update_threshold: 0.10  # minimum σ_ref ratio change to trigger update

  # ── GMM-2 Bimodal Baseline ────────────────────────────────────────────
  # During calibration, tests whether a 2-component Gaussian Mixture Model
  # fits the channel better than a single Gaussian (BIC difference > 10).
  # If so, z-scores are computed against the nearest component — bimodal
  # channels (two operating modes) no longer look like infinite-σ spikes.
  # Requires scikit-learn; falls back silently if unavailable.
  gmm_enabled: true

  # ── Per-Channel Auto Z-Threshold ─────────────────────────────────────
  # After calibration, computes the empirical 99th percentile of
  # |residual| / σ_ref and uses max(config_z, auto_z) as the effective
  # threshold.  Noisy or oscillatory channels automatically get a higher
  # threshold without manual per-dataset tuning.  Clamped to [3.0, 10.0].
  auto_z_threshold_enabled: true

  # ── STL decomposition ────────────────────────────────────────────────
  stl_recompute_every: 30   # recompute decomposition after N new points
                            # amortises O(n) STL cost across detection cycles

  # ── Adaptive context window (Sprint 10) ──────────────────────────────
  # Before historical analysis, FFT is run on up to stl_max_fft_samples rows
  # to detect the dominant signal period.  If a period is found, the rolling
  # context window is auto-scaled to stl_window_factor × period (capped at
  # stl_max_window) so that STL can remove long-period seasonal signals such
  # as 24h diurnal cycles in water quality data.
  #
  # Example: GECCO water quality (1-min sampling, 24h period = 1440 samples)
  #   → context window auto-scales from 600 → 3 × 1440 = 4320 samples
  #   → STL removes daily seasonal component → CUSUM fires only on anomalies
  #
  # Performance: stl_max_fft_samples=5000 adds one extra DB round-trip per
  # channel at analysis start.  FFT of 5000 samples is O(n log n) ≈ 0.5 ms.
  stl_max_fft_samples: 5000    # rows queried for period pre-scan (default 600 = Sprint 9)
  stl_window_factor:   3       # context_window = factor × detected_period
  stl_max_window:      10000   # absolute cap (memory guard; ~80 KB per channel)

  # ── GRU Autoencoder (ML detector, Sprint 10) ─────────────────────────
  # Trains per-channel on STL residuals; high reconstruction MSE = anomaly.
  # threshold: mse > mean_train_mse + lstm_threshold_sigma × std_train_mse
  lstm_seq_length:        30    # residual sequence window fed to encoder
  lstm_hidden_size:       32    # GRU hidden units (encoder)
  lstm_bottleneck_size:   8     # latent space dimension
  lstm_epochs:            30    # training epochs (< 1 s per channel on CPU)
  lstm_min_train_samples: 60    # min residuals before first training (2 × seq_length)
  lstm_retrain_interval:  500   # retrain every N new residuals per channel
  lstm_threshold_sigma:   3.0   # anomaly: mse > mean + K × std (from training)

  # ── TCN Detector (ML detector, Sprint 13) ────────────────────────────
  # 4-block dilated causal TCN autoencoder.  Receptive field = 61 steps (seq_len=32).
  # Deeper than GRU: no vanishing gradient, fully parallelisable on CPU.
  # threshold: mse > mean_train_mse + tcn_threshold_sigma × std_train_mse
  tcn_seq_length:        32    # residual sequence window (receptive field covers all 32)
  tcn_n_channels:        16    # conv feature channels per block
  tcn_n_blocks:          4     # dilation pattern 1,2,4,8 (4 blocks = 61-step field)
  tcn_kernel_size:       3     # conv kernel width
  tcn_epochs:            40    # training epochs (< 1 s per channel on CPU)
  tcn_min_train_samples: 64    # min residuals before first training (2 × seq_length)
  tcn_retrain_interval:  500   # retrain every N new residuals per channel
  tcn_threshold_sigma:   3.0   # anomaly: mse > mean + K × std (from training)

  # ── TrendVelocityDetector (onset detector, Sprint 14) ────────────────
  # Differentiates the STL trend component to measure drift velocity.
  # Fires when trend accelerates > tvel_threshold_sigma × (ref_std / window).
  # This catches brief onset events that CUSUM misses (needs too many samples).
  # Complements CUSUM: CUSUM catches sustained drift; this catches acceleration.
  tvel_window:           20    # trend samples for velocity estimation (np.gradient)
  tvel_recent_points:    5     # how many of the latest velocity values to evaluate
  tvel_threshold_sigma:  3.0   # alarm: velocity > σ × (ref_std / window)

  # ── Matrix Profile Discord (shape anomaly — Sprint 15) ───────────────
  # Finds subsequences with no close match in recent history (shape discords).
  # Catches novel oscillation shapes, unusual recovery trajectories, flat
  # periods in oscillating channels — anomalies statistical detectors miss.
  # Pure numpy FFT-based O(n log n) per call; no stumpy/numba required.
  matrix_profile_m:      20    # subsequence length (samples)
  matrix_profile_buffer: 300   # look-back window (residual count)
  matrix_profile_sigma:  3.0   # alarm: discord > mean + sigma × std

  # ── ML Model persistence (warm-start across runs) — Sprint 16 ─────────
  # Set to a writable path to enable warm-start; comment out to disable.
  # Each channel saves two files: <sat>/<param>.lstm.pt and <sat>/<param>.tcn.pt
  # (~20-30 KB each).  On the next run the model is ready without retraining.
  model_dir: ~/.dsremo/models

  # ── Isolation Forest (multivariate cross-parameter) ──────────────────
  # Sprint 14: now activates for ANY satellite with ≥2 parameters (not just
  # standard simulator parameter names).  OPS-SAT, CATS, GECCO all benefit.
  isolation_contamination: 0.001  # expected anomaly fraction (~0.1%)
  isolation_lookback: 3600       # samples for training window

  # ── PELT changepoint (structural breaks in residuals) ────────────────
  changepoint_penalty: 10   # higher = fewer, more confident changepoints
  changepoint_min_size: 50  # minimum segment length between breakpoints

  # ── Correlation Graph Detector (STGLR-inspired, Sprint 19) ──────────
  # Detects relationship breakdown between correlated channels.
  # window: rolling buffer size per channel (samples)
  # min_calibration: samples before detection activates (per pair)
  # threshold_sigma: z-score of correlation deviation to alarm
  corr_graph_window:           60    # rolling window per channel
  corr_graph_min_calibration:  100   # samples to establish baseline correlation
  corr_graph_threshold_sigma:  3.0   # alarm when correlation z > this

  # ── Ensemble weights (must sum to 1.0) ───────────────────────────────
  # Sprint 20: 12-detector ensemble — BOCPD replaces PELT changepoint weight
  ensemble_weights:
    cusum:             0.17   # primary: gradual drift accumulation
    ewma:              0.14   # secondary: sudden level shifts
    statistical:       0.10   # spike detection (single-point outliers)
    changepoint:       0.00   # PELT structural break — superseded by bocpd (weight=0)
    isolation_forest:  0.05   # multivariate (≥2 parameters required)
    variance:          0.07   # variance-spike detector (CATS-type oscillatory signals)
    lstm:              0.10   # GRU autoencoder — temporal pattern anomalies (ML)
    tcn:               0.09   # TCN — dilated causal convolutions, deeper ML patterns
    trend_velocity:    0.08   # STL trend acceleration — onset detection (Sprint 14)
    matrix_profile:    0.06   # Matrix Profile discord — shape anomaly detection (Sprint 15)
    correlation_graph: 0.06   # Correlation graph — relationship breakdown (Sprint 19)
    bocpd:             0.08   # Bayesian online changepoint — Adams & MacKay 2007 (Sprint 20)

  # ── Severity gates (on ensemble confidence 0–1) ──────────────────────
  severity_thresholds:
    watch:    0.50
    warning:  0.65
    critical: 0.85

features:
  windows:
    - 300    # 5 minutes
    - 900    # 15 minutes
    - 3600   # 1 hour
  orbital_period: 5400  # 90 minutes in seconds (LEO)

auth:
  access_token_ttl_seconds: 900      # 15 minutes
  refresh_token_ttl_seconds: 604800  # 7 days
  # jwt_secret: MUST be set via DSREMO_JWT_SECRET env var — never hardcode here

alerts:
  webhook_url: ""
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  smtp_password: ""
  dedup_window_seconds: 300   # suppress duplicate alerts for 5 min
  escalation_delay_seconds: 600  # escalate if anomaly persists 10 min

simulator:
  default_satellite: "DEMO-SAT-01"
  telemetry_rate_hz: 1.0
  noise_level: 0.02         # 2% sensor noise
  subsystems:
    eps:
      parameters:
        battery_voltage: { unit: "V", nominal: 7.4, min: 6.0, max: 8.4 }
        battery_current: { unit: "A", nominal: 1.2, min: 0.0, max: 5.0 }
        solar_array_current: { unit: "A", nominal: 2.5, min: 0.0, max: 4.0 }
        bus_voltage: { unit: "V", nominal: 5.0, min: 4.5, max: 5.5 }
    adcs:
      parameters:
        wheel_speed_x: { unit: "rpm", nominal: 3000, min: 0, max: 6000 }
        wheel_speed_y: { unit: "rpm", nominal: 3000, min: 0, max: 6000 }
        wheel_speed_z: { unit: "rpm", nominal: 3000, min: 0, max: 6000 }
        pointing_error: { unit: "deg", nominal: 0.1, min: 0.0, max: 5.0 }
    thermal:
      parameters:
        panel_temp_sun: { unit: "C", nominal: 60.0, min: -40, max: 120 }
        panel_temp_shade: { unit: "C", nominal: -20.0, min: -80, max: 40 }
        battery_temp: { unit: "C", nominal: 22.0, min: 5, max: 45 }
        electronics_temp: { unit: "C", nominal: 30.0, min: 10, max: 60 }
    comms:
      parameters:
        signal_strength: { unit: "dBm", nominal: -80.0, min: -120, max: -50 }
        bit_error_rate: { unit: "", nominal: 0.0001, min: 0.0, max: 0.1 }
        link_margin: { unit: "dB", nominal: 10.0, min: 0.0, max: 20.0 }
