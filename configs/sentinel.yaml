# Sentinel Configuration
# Secrets go in environment variables, never here.

server:
  host: "0.0.0.0"
  port: 8400
  workers: 1
  cors_origins:
    - "http://localhost:8400"

database:
  host: "localhost"
  port: 5432
  name: "sentinel"
  user: "sentinel"
  password: ""  # overridden by SENTINEL_DB_PASSWORD env var
  pool_min: 2
  pool_max: 10

security:
  api_key_header: "X-API-Key"
  rate_limit_per_minute: 300
  max_payload_bytes: 1_048_576  # 1 MB
  hmac_algorithm: "sha256"

detection:
  # ── Z-Score spike detector (runs on STL residuals) ──────────────────
  z_score_threshold: 3.0    # flag residuals above 3σ from rolling mean
                            # z-score is spike-only; drift is handled by CUSUM

  # ── CUSUM drift detector — NASA standard parameters ─────────────────
  # k = allowance = 0.5 × σ_ref   (detect shifts ≥ 1σ)
  # H = threshold = 8.0 × σ_ref   (require 8σ of accumulated evidence)
  #   H was raised from 5.0 to 8.0 to handle long-term telemetry drift;
  #   satellite signals age over months/years — a higher threshold avoids
  #   flagging normal aging as anomalies.
  # Both are per-channel — derived from the calibration reference window.
  cusum_k_factor: 0.5
  cusum_h_factor: 8.0
  cusum_recal_factor: 3.0   # recalibrate if mean drifts > 3σ for 20 samples
                            # lower = more responsive to slow regime shifts

  # ── EWMA level-shift detector ────────────────────────────────────────
  ewma_lambda: 0.1          # smoothing: 0.1=slow/sensitive, 0.3=fast/noisy
                            # lowered from 0.2 → less reactive to brief spikes
  ewma_sigma_factor: 3.5    # UCL/LCL = ±3.5σ × sqrt(λ/(2-λ))
                            # raised from 3.0 → fewer false level-shift alarms

  # ── Per-channel calibration ──────────────────────────────────────────
  calibration_window: 200   # residual samples before CUSUM/EWMA activate
                            # 200 hourly points = ~8 days: better σ_ref estimate
                            # than 100 (4 days); still activates in first week.

  # ── Alert cooldown: minimum hours between anomaly reports ────────────
  # Suppresses repeated alarms during a sustained anomalous regime.
  # Each distinct anomaly event should be flagged once, not repeatedly.
  # 360 h = 15 days: caps channels with persistent signals at ~13 alarms
  # over a 13-year mission (4745 days / 15 days ≈ 316 max, but adaptive
  # σ_ref should reduce genuine alarm rate well below that ceiling).
  alert_cooldown_hours: 360  # 15 days between same-channel reports

  # ── Adaptive σ_ref: periodic noise-floor refresh ─────────────────────
  # After initial calibration, σ_ref is refreshed every N samples using
  # the last CALIBRATION_WINDOW post-calibration residuals.  This prevents
  # the frozen σ_ref (from the first 8 days of data) from becoming stale
  # on 13-year signals where component aging or seasonal effects slowly
  # change the noise variance.  A too-small σ_ref makes CUSUM accumulate
  # normal drift and fire as false positives.
  # 720 = 30 days at 1-h resampling.  Only updates when σ changes >10%.
  sigma_update_interval: 720

  # ── STL decomposition ────────────────────────────────────────────────
  stl_recompute_every: 30   # recompute decomposition after N new points
                            # amortises O(n) STL cost across detection cycles

  # ── Isolation Forest (multivariate cross-parameter) ──────────────────
  isolation_contamination: 0.01  # expected anomaly fraction (~1%)
  isolation_lookback: 3600       # samples for training window

  # ── PELT changepoint (structural breaks in residuals) ────────────────
  changepoint_penalty: 10   # higher = fewer, more confident changepoints
  changepoint_min_size: 50  # minimum segment length between breakpoints

  # ── Ensemble weights (must sum to 1.0) ───────────────────────────────
  ensemble_weights:
    cusum:            0.30   # primary: gradual drift accumulation
    ewma:             0.25   # secondary: sudden level shifts
    statistical:      0.20   # spike detection (single-point outliers)
    changepoint:      0.15   # structural break detection
    isolation_forest: 0.10   # multivariate (only for standard param names)

  # ── Severity gates (on ensemble confidence 0–1) ──────────────────────
  severity_thresholds:
    watch:    0.50
    warning:  0.65
    critical: 0.85

features:
  windows:
    - 300    # 5 minutes
    - 900    # 15 minutes
    - 3600   # 1 hour
  orbital_period: 5400  # 90 minutes in seconds (LEO)

alerts:
  webhook_url: ""
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  smtp_password: ""
  dedup_window_seconds: 300   # suppress duplicate alerts for 5 min
  escalation_delay_seconds: 600  # escalate if anomaly persists 10 min

simulator:
  default_satellite: "DEMO-SAT-01"
  telemetry_rate_hz: 1.0
  noise_level: 0.02         # 2% sensor noise
  subsystems:
    eps:
      parameters:
        battery_voltage: { unit: "V", nominal: 7.4, min: 6.0, max: 8.4 }
        battery_current: { unit: "A", nominal: 1.2, min: 0.0, max: 5.0 }
        solar_array_current: { unit: "A", nominal: 2.5, min: 0.0, max: 4.0 }
        bus_voltage: { unit: "V", nominal: 5.0, min: 4.5, max: 5.5 }
    adcs:
      parameters:
        wheel_speed_x: { unit: "rpm", nominal: 3000, min: 0, max: 6000 }
        wheel_speed_y: { unit: "rpm", nominal: 3000, min: 0, max: 6000 }
        wheel_speed_z: { unit: "rpm", nominal: 3000, min: 0, max: 6000 }
        pointing_error: { unit: "deg", nominal: 0.1, min: 0.0, max: 5.0 }
    thermal:
      parameters:
        panel_temp_sun: { unit: "C", nominal: 60.0, min: -40, max: 120 }
        panel_temp_shade: { unit: "C", nominal: -20.0, min: -80, max: 40 }
        battery_temp: { unit: "C", nominal: 22.0, min: 5, max: 45 }
        electronics_temp: { unit: "C", nominal: 30.0, min: 10, max: 60 }
    comms:
      parameters:
        signal_strength: { unit: "dBm", nominal: -80.0, min: -120, max: -50 }
        bit_error_rate: { unit: "", nominal: 0.0001, min: 0.0, max: 0.1 }
        link_margin: { unit: "dB", nominal: 10.0, min: 0.0, max: 20.0 }
