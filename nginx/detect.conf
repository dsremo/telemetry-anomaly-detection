# Dsremo Telemetry Anomaly Detection — nginx config
# Domain: detect.dsremo.com ONLY
# SpaceAi EC2 — completely separate from Miscellenous EC2 (13.233.215.211)

limit_req_zone $binary_remote_addr zone=detect_api:10m rate=60r/m;

upstream detect_api {
    server detect-api:8400;
}

# ── HTTP — redirect to HTTPS + ACME challenge ──────────────────────────────
server {
    listen 80;
    server_name detect.dsremo.com;

    # Certbot ACME challenge — must work before SSL cert is obtained
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name detect.dsremo.com;

    ssl_certificate     /etc/nginx/ssl/live/detect.dsremo.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/detect.dsremo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    client_max_body_size 10M;

    # Security headers
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy         "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # All traffic → FastAPI (serves dashboard UI + API at /api/v1/)
    location / {
        limit_req zone=detect_api burst=30 nodelay;

        proxy_pass         http://detect_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # WebSocket support (for live telemetry stream)
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
